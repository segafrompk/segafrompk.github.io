  <head>

    <title>Document</title>
    <style>
      .folder {
        background-size: contain;
        background-repeat: no-repeat;
        display: inline-block;
        width: 100%;
        position: relative;
        vertical-align: top;
      }

      .folder * {
        position: relative;
      }

      .overlay {
        position: relative;
      }

      .overlay:before{
        position: absolute;
        display: block;
        content:" ";
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:0;
        background-color: rgba(0,0,0,0.7);
      }

      .tekstPrekoSlike {
        position: absolute;
        font-size: 2rem;
        color: #ffffff;
      }

      .dummy {
        padding-top: 75%;
      }

    </style>
  </head>

    <div class="galerija">
      <div class="row">
      </div>
    </div>

    <script type="text/javascript" src="js/bootstrap.min.js"></script>
    <script type="text/javascript" src="js/baguetteBox.min.js"></script>
    <script src="js/galerija.js"></script>
  </body>
